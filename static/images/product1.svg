<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="tshirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- T-shirt body -->
  <path d="M 80 100 L 120 80 L 280 80 L 320 100 L 330 250 L 70 250 Z" fill="url(#tshirtGrad)" stroke="#999" stroke-width="1"/>
  
  <!-- Left sleeve -->
  <ellipse cx="60" cy="130" rx="35" ry="80" fill="url(#tshirtGrad)" stroke="#999" stroke-width="1"/>
  
  <!-- Right sleeve -->
  <ellipse cx="340" cy="130" rx="35" ry="80" fill="url(#tshirtGrad)" stroke="#999" stroke-width="1"/>
  
  <!-- Neckline shadow -->
  <ellipse cx="200" cy="85" rx="45" ry="20" fill="#ddd"/>
  
  <!-- Design - SUN/SALT/SAND text with colors -->
  <text x="200" y="140" font-size="52" font-weight="900" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="8">
    <tspan fill="#FF1493">S</tspan><tspan fill="#87CEEB">U</tspan><tspan fill="#FFD700">N</tspan>
  </text>
  
  <text x="200" y="210" font-size="52" font-weight="900" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="8">
    <tspan fill="#00CED1">S</tspan><tspan fill="#FF69B4">A</tspan><tspan fill="#FFD700">L</tspan><tspan fill="#87CEEB">T</tspan>
  </text>
  
  <text x="200" y="280" font-size="52" font-weight="900" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="8">
    <tspan fill="#87CEEB">S</tspan><tspan fill="#FF1493">A</tspan><tspan fill="#4B0082">N</tspan><tspan fill="#FFD700">D</tspan>
  </text>
  
  <!-- Palm trees -->
  <g opacity="0.7">
    <!-- Left palm -->
    <rect x="95" y="320" width="8" height="50" fill="#8B6914"/>
    <circle cx="99" cy="315" r="12" fill="#228B22"/>
    <ellipse cx="85" cy="305" rx="5" ry="15" fill="#228B22" transform="rotate(-45 85 305)"/>
    <ellipse cx="113" cy="305" rx="5" ry="15" fill="#228B22" transform="rotate(45 113 305)"/>
    <ellipse cx="80" cy="320" rx="6" ry="14" fill="#228B22" transform="rotate(-60 80 320)"/>
    <ellipse cx="118" cy="320" rx="6" ry="14" fill="#228B22" transform="rotate(60 118 320)"/>
    
    <!-- Right palm -->
    <rect x="297" y="320" width="8" height="50" fill="#8B6914"/>
    <circle cx="301" cy="315" r="12" fill="#228B22"/>
    <ellipse cx="287" cy="305" rx="5" ry="15" fill="#228B22" transform="rotate(-45 287 305)"/>
    <ellipse cx="315" cy="305" rx="5" ry="15" fill="#228B22" transform="rotate(45 315 305)"/>
    <ellipse cx="282" cy="320" rx="6" ry="14" fill="#228B22" transform="rotate(-60 282 320)"/>
    <ellipse cx="320" cy="320" rx="6" ry="14" fill="#228B22" transform="rotate(60 320 320)"/>
  </g>
  
  <!-- Fabric wrinkles -->
  <path d="M 150 200 Q 160 220 150 240" stroke="#d0d0d0" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 250 200 Q 240 220 250 240" stroke="#d0d0d0" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Shadow under sleeves -->
  <path d="M 95 160 Q 80 180 85 210" stroke="#999" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 305 160 Q 320 180 315 210" stroke="#999" stroke-width="1" fill="none" opacity="0.3"/>
</svg>